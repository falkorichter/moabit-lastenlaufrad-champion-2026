<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>">
</head>
<body>
  {{ content }}

  <footer>
    <div class="container">
      <p>
        Moabiter Lastenlaufrad Kiez-WM 2026 &mdash;
        organisiert von <a href="https://www.pimpmycargo.bike" target="_blank" rel="noopener">PimpMyCargo</a>
        &mdash; Fragen? <a href="#" class="obf-mail" data-em="bW9hYml0LTIwMjZAcGltcG15Y2FyZ28uYmlrZQ==">moabit-2026 [at] pimpmycargo.bike</a>
      </p>
    </div>
  </footer>
  <script>
    document.querySelectorAll('.obf-mail').forEach(function(el) {
      var addr = atob(el.dataset.em);
      el.href = 'mailto:' + addr;
      el.textContent = addr;
    });

    (function() {
      if (new URLSearchParams(window.location.search).get('danke') === '1') {
        var modal = document.getElementById('danke-modal');
        if (modal) {
          modal.hidden = false;
          history.replaceState(null, '', window.location.pathname);
        }
      }
    })();

    function closeDanke() {
      document.getElementById('danke-modal').hidden = true;
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDanke();
    });
  </script>
</body>
</html>
